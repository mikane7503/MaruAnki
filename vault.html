<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>볼트 - MaruAnki</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1><a href="vaults.html" style="color:inherit; text-decoration:none;">MaruAnki</a></h1>
    <a id="logoutLink">로그아웃</a>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2><span id="vaultName">볼트</span> <span class="tile-meta" id="vaultTypeLabel"></span></h2>
      <div style="display:flex; gap:8px;">
        <button type="button" class="secondary" id="exportVaultBtn">내보내기</button>
        <button type="button" class="secondary" id="settingsBtn">설정</button>
        <button type="button" id="addCardBtn">+ 카드 추가</button>
      </div>
    </div>
    <div class="field" style="margin-top:12px;">
      <input type="text" id="searchInput" placeholder="카드 검색 (앞면/뒷면)" />
    </div>
    <p class="kbd-hint">카드를 클릭해 선택 후: <kbd>Space</kbd> 뒤집기 · <kbd>1</kbd> again · <kbd>2</kbd> bad · <kbd>3</kbd> good · <kbd>4</kbd> ok</p>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty-state hidden" id="emptyState">아직 카드가 없습니다. "카드 추가"로 첫 카드를 만들어보세요.</div>
  </div>

  <div class="modal-overlay hidden" id="cardModal">
    <div class="modal">
      <h3 id="cardModalTitle">카드 추가</h3>
      <form id="cardForm">
        <div class="field">
          <label for="cardFront">앞면 (문제)</label>
          <textarea id="cardFront" required maxlength="2000"></textarea>
        </div>
        <div class="field">
          <label for="cardBack">뒷면 (답)</label>
          <textarea id="cardBack" required maxlength="2000"></textarea>
        </div>
        <div class="error-msg" id="cardError"></div>
        <div class="modal-actions">
          <button type="button" class="secondary" id="cancelCard">취소</button>
          <button type="submit" id="saveCardBtn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="deleteCardModal">
    <div class="modal">
      <h3>카드 삭제</h3>
      <p style="color: var(--muted); font-size: 14px;">이 카드를 삭제할까요? 되돌릴 수 없습니다.</p>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelDeleteCard">취소</button>
        <button type="button" class="danger" id="confirmDeleteCard">삭제</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <h3>볼트 설정</h3>
      <p style="color: var(--muted); font-size: 13px; margin-top: -8px;">복습 버튼을 누를 때 만료일을 계산하는 방식을 조정합니다.</p>
      <form id="settingsForm">
        <div class="field">
          <label for="setBaseInterval">기본 간격 (일) — 새 카드 / 다시체크 시 사용</label>
          <input type="number" id="setBaseInterval" min="1" step="1" required />
        </div>
        <div class="field">
          <label for="setBadMultiplier">나쁨(bad) 배율</label>
          <input type="number" id="setBadMultiplier" min="1" step="0.1" required />
        </div>
        <div class="field">
          <label for="setGoodMultiplier">좋음(good) 배율</label>
          <input type="number" id="setGoodMultiplier" min="1" step="0.1" required />
        </div>
        <div class="field">
          <label for="setEasyMultiplier">쉬움(ok) 배율</label>
          <input type="number" id="setEasyMultiplier" min="1" step="0.1" required />
        </div>
        <div class="field">
          <label for="setMinInterval">최소 간격 (일)</label>
          <input type="number" id="setMinInterval" min="1" step="1" required />
        </div>
        <div class="field">
          <label for="setMaxInterval">최대 간격 (일)</label>
          <input type="number" id="setMaxInterval" min="1" step="1" required />
        </div>
        <div class="error-msg" id="settingsError"></div>
        <div class="modal-actions">
          <button type="button" class="secondary" id="cancelSettings">취소</button>
          <button type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import {
      auth, db, onAuthStateChanged, signOut,
      collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDoc,
    } from "./js/firebase.js";
    import {
      DEFAULT_INTERVAL_DAYS, nextIntervalDays, cardColor, formatExpiry, addDays, toDate,
      withDefaultSettings, downloadJson,
    } from "./js/utils.js";

    const VAULT_TYPE_LABEL = { card: "카드 스타일", sentence: "문장 스타일" };
    const VAULT_TYPE_MAXLENGTH = { card: 300, sentence: 4000 };

    const params = new URLSearchParams(window.location.search);
    const vaultId = params.get("id");
    if (!vaultId) window.location.href = "vaults.html";

    const vaultNameEl = document.getElementById("vaultName");
    const vaultTypeLabelEl = document.getElementById("vaultTypeLabel");
    const cardGrid = document.getElementById("cardGrid");
    const emptyState = document.getElementById("emptyState");
    const addCardBtn = document.getElementById("addCardBtn");
    const cardModal = document.getElementById("cardModal");
    const cardModalTitle = document.getElementById("cardModalTitle");
    const cardForm = document.getElementById("cardForm");
    const cardFront = document.getElementById("cardFront");
    const cardBack = document.getElementById("cardBack");
    const cardError = document.getElementById("cardError");
    const cancelCard = document.getElementById("cancelCard");
    const deleteCardModal = document.getElementById("deleteCardModal");
    const cancelDeleteCard = document.getElementById("cancelDeleteCard");
    const confirmDeleteCard = document.getElementById("confirmDeleteCard");
    const logoutLink = document.getElementById("logoutLink");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsModal = document.getElementById("settingsModal");
    const settingsForm = document.getElementById("settingsForm");
    const settingsError = document.getElementById("settingsError");
    const cancelSettings = document.getElementById("cancelSettings");
    const exportVaultBtn = document.getElementById("exportVaultBtn");
    const searchInput = document.getElementById("searchInput");

    let currentUser = null;
    let currentVaultName = "";
    let unsubscribeCards = null;
    let editingCardId = null;
    let cardIdToDelete = null;
    let currentSettings = withDefaultSettings();
    let currentVaultType = "card";
    let activeCardId = null;
    let searchQuery = "";
    const flippedCards = new Set();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUser = user;
      await loadVaultInfo();
      subscribeCards();
    });

    logoutLink.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    async function loadVaultInfo() {
      const vaultRef = doc(db, "users", currentUser.uid, "vaults", vaultId);
      const snap = await getDoc(vaultRef);
      if (!snap.exists()) {
        window.location.href = "vaults.html";
        return;
      }
      const data = snap.data();
      vaultNameEl.textContent = data.name;
      currentVaultName = data.name;
      currentSettings = withDefaultSettings(data.settings);
      currentVaultType = data.type === "sentence" ? "sentence" : "card";
      vaultTypeLabelEl.textContent = VAULT_TYPE_LABEL[currentVaultType];
      cardGrid.classList.add(`style-${currentVaultType}`);
      const maxLen = VAULT_TYPE_MAXLENGTH[currentVaultType];
      cardFront.maxLength = maxLen;
      cardBack.maxLength = maxLen;
    }

    settingsBtn.addEventListener("click", () => {
      settingsError.textContent = "";
      document.getElementById("setBaseInterval").value = currentSettings.baseIntervalDays;
      document.getElementById("setBadMultiplier").value = currentSettings.badMultiplier;
      document.getElementById("setGoodMultiplier").value = currentSettings.goodMultiplier;
      document.getElementById("setEasyMultiplier").value = currentSettings.easyMultiplier;
      document.getElementById("setMinInterval").value = currentSettings.minIntervalDays;
      document.getElementById("setMaxInterval").value = currentSettings.maxIntervalDays;
      settingsModal.classList.remove("hidden");
    });

    cancelSettings.addEventListener("click", () => settingsModal.classList.add("hidden"));

    settingsForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const newSettings = {
        baseIntervalDays: Number(document.getElementById("setBaseInterval").value),
        badMultiplier: Number(document.getElementById("setBadMultiplier").value),
        goodMultiplier: Number(document.getElementById("setGoodMultiplier").value),
        easyMultiplier: Number(document.getElementById("setEasyMultiplier").value),
        minIntervalDays: Number(document.getElementById("setMinInterval").value),
        maxIntervalDays: Number(document.getElementById("setMaxInterval").value),
      };
      if (newSettings.minIntervalDays > newSettings.maxIntervalDays) {
        settingsError.textContent = "최소 간격이 최대 간격보다 클 수 없습니다.";
        return;
      }
      try {
        await updateDoc(doc(db, "users", currentUser.uid, "vaults", vaultId), { settings: newSettings });
        currentSettings = withDefaultSettings(newSettings);
        settingsModal.classList.add("hidden");
      } catch (err) {
        settingsError.textContent = "설정 저장에 실패했습니다.";
      }
    });

    exportVaultBtn.addEventListener("click", async () => {
      exportVaultBtn.disabled = true;
      exportVaultBtn.textContent = "내보내는 중...";
      try {
        const cards = lastDocs.map((docSnap) => {
          const cd = docSnap.data();
          const expiresAt = toDate(cd.expiresAt);
          return {
            front: cd.front,
            back: cd.back,
            status: cd.status || "graded",
            intervalDays: cd.intervalDays || null,
            expiresAt: expiresAt ? expiresAt.toISOString() : null,
          };
        });
        downloadJson(
          { exportedAt: new Date().toISOString(), name: currentVaultName, type: currentVaultType, settings: currentSettings, cards },
          `maruanki-${currentVaultName || "vault"}-${new Date().toISOString().slice(0, 10)}.json`
        );
      } finally {
        exportVaultBtn.disabled = false;
        exportVaultBtn.textContent = "내보내기";
      }
    });

    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderCardsNow();
    });

    function isAnyModalOpen() {
      return ![cardModal, deleteCardModal, settingsModal].every((m) => m.classList.contains("hidden"));
    }

    function applyCardFormPlaceholders() {
      if (currentVaultType === "sentence") {
        cardFront.placeholder = "외울 문장 전체를 입력하세요";
        cardBack.placeholder = "번역 또는 의미를 입력하세요";
      } else {
        cardFront.placeholder = "짧은 질문을 입력하세요";
        cardBack.placeholder = "답을 입력하세요";
      }
    }

    addCardBtn.addEventListener("click", () => {
      editingCardId = null;
      cardModalTitle.textContent = "카드 추가";
      cardForm.reset();
      cardError.textContent = "";
      applyCardFormPlaceholders();
      cardModal.classList.remove("hidden");
    });

    cancelCard.addEventListener("click", () => cardModal.classList.add("hidden"));

    cardForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const front = cardFront.value.trim();
      const back = cardBack.value.trim();
      if (!front || !back) return;
      const cardsCol = collection(db, "users", currentUser.uid, "vaults", vaultId, "cards");
      try {
        if (editingCardId) {
          await updateDoc(doc(cardsCol, editingCardId), { front, back, updatedAt: serverTimestamp() });
        } else {
          const now = new Date();
          const base = currentSettings.baseIntervalDays;
          await addDoc(cardsCol, {
            front,
            back,
            status: "graded",
            intervalDays: base,
            expiresAt: addDays(now, base),
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
          });
        }
        cardModal.classList.add("hidden");
      } catch (err) {
        cardError.textContent = "저장에 실패했습니다.";
      }
    });

    cancelDeleteCard.addEventListener("click", () => {
      cardIdToDelete = null;
      deleteCardModal.classList.add("hidden");
    });

    confirmDeleteCard.addEventListener("click", async () => {
      if (!cardIdToDelete) return;
      await deleteDoc(doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardIdToDelete));
      cardIdToDelete = null;
      deleteCardModal.classList.add("hidden");
    });

    let lastDocs = [];
    function subscribeCards() {
      const q = query(collection(db, "users", currentUser.uid, "vaults", vaultId, "cards"), orderBy("createdAt", "desc"));
      unsubscribeCards = onSnapshot(q, (snap) => {
        lastDocs = snap.docs;
        renderCardsNow();
      });
    }

    function findCardDoc(cardId) {
      return lastDocs.find((d) => d.id === cardId);
    }

    function getVisibleDocs() {
      if (!searchQuery) return lastDocs;
      return lastDocs.filter((d) => {
        const data = d.data();
        return (data.front || "").toLowerCase().includes(searchQuery) || (data.back || "").toLowerCase().includes(searchQuery);
      });
    }

    function renderCardsNow() {
      const visible = getVisibleDocs();
      emptyState.classList.toggle("hidden", visible.length !== 0);
      emptyState.textContent = searchQuery
        ? "검색 결과가 없습니다."
        : "아직 카드가 없습니다. \"카드 추가\"로 첫 카드를 만들어보세요.";
      cardGrid.innerHTML = "";
      if (!activeCardId || !visible.some((d) => d.id === activeCardId)) {
        activeCardId = visible.length ? visible[0].id : null;
      }
      visible.forEach((docSnap) => renderCard(docSnap));
    }

    function setActiveCard(cardId) {
      if (activeCardId === cardId) return;
      const prev = cardGrid.querySelector(".card-flip.active");
      if (prev) prev.classList.remove("active");
      activeCardId = cardId;
      const el = cardGrid.querySelector(`.card-flip[data-card-id="${cardId}"]`);
      if (el) el.classList.add("active");
    }

    function setFlipped(cardId, flipped) {
      if (flipped) flippedCards.add(cardId);
      else flippedCards.delete(cardId);
      const inner = cardGrid.querySelector(`.card-flip[data-card-id="${cardId}"] .card-flip-inner`);
      if (inner) inner.classList.toggle("flipped", flipped);
      setActiveCard(cardId);
    }

    async function gradeCard(cardId, grade) {
      const docSnap = findCardDoc(cardId);
      if (!docSnap || !flippedCards.has(cardId)) return;
      const data = docSnap.data();
      if (data.status === "held") return;
      const cardRef = doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardId);
      const newInterval = nextIntervalDays(data.intervalDays, grade, currentSettings);
      flippedCards.delete(cardId);
      await updateDoc(cardRef, {
        status: "graded",
        intervalDays: newInterval,
        expiresAt: addDays(new Date(), newInterval),
        updatedAt: serverTimestamp(),
      });
    }

    async function toggleAgain(cardId) {
      const docSnap = findCardDoc(cardId);
      if (!docSnap || !flippedCards.has(cardId)) return;
      const data = docSnap.data();
      const cardRef = doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardId);
      flippedCards.delete(cardId);
      if (data.status === "held") {
        const base = currentSettings.baseIntervalDays;
        await updateDoc(cardRef, {
          status: "graded",
          intervalDays: base,
          expiresAt: addDays(new Date(), base),
          updatedAt: serverTimestamp(),
        });
      } else {
        await updateDoc(cardRef, {
          status: "held",
          intervalDays: currentSettings.baseIntervalDays,
          updatedAt: serverTimestamp(),
        });
      }
    }

    function statusChipInfo(card) {
      if (card.status === "held") return { icon: "⏸", label: "보류" };
      const color = cardColor(card);
      if (color === "green") return { icon: "●", label: "안정" };
      if (color === "yellow") return { icon: "▲", label: "주의" };
      return { icon: "■", label: "긴급" };
    }

    function buildFaceLabel(labelText, card) {
      const wrap = document.createElement("div");
      wrap.className = "card-face-label";
      const label = document.createElement("span");
      label.textContent = labelText;
      wrap.appendChild(label);

      const chipInfo = statusChipInfo(card);
      const chip = document.createElement("span");
      chip.className = "status-chip";
      chip.innerHTML = `<span class="status-icon">${chipInfo.icon}</span>${chipInfo.label}`;
      wrap.appendChild(chip);
      return wrap;
    }

    function buildEditRow(cardId, data) {
      const editRow = document.createElement("div");
      editRow.className = "card-edit-row";

      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "icon-btn";
      editBtn.textContent = "수정";
      editBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        openEdit(cardId, data);
      });

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "icon-btn";
      delBtn.textContent = "삭제";
      delBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        cardIdToDelete = cardId;
        deleteCardModal.classList.remove("hidden");
      });

      editRow.appendChild(editBtn);
      editRow.appendChild(delBtn);
      return editRow;
    }

    function renderCard(docSnap) {
      const data = docSnap.data();
      const cardId = docSnap.id;
      const card = {
        status: data.status || "graded",
        intervalDays: data.intervalDays || DEFAULT_INTERVAL_DAYS,
        expiresAt: toDate(data.expiresAt),
      };
      const color = cardColor(card);
      const isFlipped = flippedCards.has(cardId);

      const wrapper = document.createElement("div");
      wrapper.className = `card-flip color-${color}${cardId === activeCardId ? " active" : ""}`;
      wrapper.dataset.cardId = cardId;
      wrapper.addEventListener("click", () => setActiveCard(cardId));

      const inner = document.createElement("div");
      inner.className = `card-flip-inner${isFlipped ? " flipped" : ""}`;

      // 앞면
      const front = document.createElement("div");
      front.className = "card-face card-face-front";
      front.appendChild(buildFaceLabel("앞면", card));

      const frontText = document.createElement("div");
      frontText.className = "card-text";
      frontText.textContent = data.front;
      frontText.addEventListener("click", (ev) => {
        ev.stopPropagation();
        setFlipped(cardId, true);
      });
      front.appendChild(frontText);

      const frontFooter = document.createElement("div");
      frontFooter.className = "card-footer";
      const frontExpiry = document.createElement("span");
      frontExpiry.textContent = card.status === "held" ? "고정됨 (again)" : formatExpiry(card.expiresAt);
      frontFooter.appendChild(frontExpiry);
      front.appendChild(frontFooter);
      front.appendChild(buildEditRow(cardId, data));

      // 뒷면
      const back = document.createElement("div");
      back.className = "card-face card-face-back";
      back.appendChild(buildFaceLabel("뒷면", card));

      const backText = document.createElement("div");
      backText.className = "card-text";
      backText.textContent = data.back;
      backText.addEventListener("click", (ev) => {
        ev.stopPropagation();
        setFlipped(cardId, false);
      });
      back.appendChild(backText);

      const actions = document.createElement("div");
      actions.className = "card-actions";

      const againBtn = document.createElement("button");
      againBtn.type = "button";
      againBtn.className = "btn-unknown";
      againBtn.textContent = data.status === "held" ? "다시 체크" : "again";
      againBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        toggleAgain(cardId);
      });
      actions.appendChild(againBtn);

      if (data.status !== "held") {
        [
          { grade: "bad", label: "bad", cls: "btn-bad" },
          { grade: "good", label: "good", cls: "btn-know" },
          { grade: "easy", label: "ok", cls: "btn-know" },
        ].forEach(({ grade, label, cls }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = cls;
          btn.textContent = label;
          btn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            gradeCard(cardId, grade);
          });
          actions.appendChild(btn);
        });
      }
      back.appendChild(actions);

      const backFooter = document.createElement("div");
      backFooter.className = "card-footer";
      const backExpiry = document.createElement("span");
      backExpiry.textContent = card.status === "held" ? "고정됨 (again)" : formatExpiry(card.expiresAt);
      backFooter.appendChild(backExpiry);
      back.appendChild(backFooter);
      back.appendChild(buildEditRow(cardId, data));

      inner.appendChild(front);
      inner.appendChild(back);
      wrapper.appendChild(inner);
      cardGrid.appendChild(wrapper);
    }

    function openEdit(cardId, data) {
      editingCardId = cardId;
      cardModalTitle.textContent = "카드 수정";
      applyCardFormPlaceholders();
      cardFront.value = data.front;
      cardBack.value = data.back;
      cardError.textContent = "";
      cardModal.classList.remove("hidden");
    }

    document.addEventListener("keydown", (e) => {
      const tag = document.activeElement ? document.activeElement.tagName : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (isAnyModalOpen()) return;
      if (!activeCardId) return;

      if (e.key === " ") {
        e.preventDefault();
        setFlipped(activeCardId, !flippedCards.has(activeCardId));
      } else if (e.key === "1") {
        toggleAgain(activeCardId);
      } else if (e.key === "2") {
        gradeCard(activeCardId, "bad");
      } else if (e.key === "3") {
        gradeCard(activeCardId, "good");
      } else if (e.key === "4") {
        gradeCard(activeCardId, "easy");
      }
    });
  </script>
</body>
</html>
