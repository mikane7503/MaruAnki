<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>볼트 - MaruAnki</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1><a href="vaults.html" style="color:inherit; text-decoration:none;">MaruAnki</a></h1>
    <a id="logoutLink">로그아웃</a>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2 id="vaultName">볼트</h2>
      <button type="button" id="addCardBtn">+ 카드 추가</button>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="empty-state hidden" id="emptyState">아직 카드가 없습니다. "카드 추가"로 첫 카드를 만들어보세요.</div>
  </div>

  <div class="modal-overlay hidden" id="cardModal">
    <div class="modal">
      <h3 id="cardModalTitle">카드 추가</h3>
      <form id="cardForm">
        <div class="field">
          <label for="cardFront">앞면 (문제)</label>
          <textarea id="cardFront" required maxlength="2000"></textarea>
        </div>
        <div class="field">
          <label for="cardBack">뒷면 (답)</label>
          <textarea id="cardBack" required maxlength="2000"></textarea>
        </div>
        <div class="error-msg" id="cardError"></div>
        <div class="modal-actions">
          <button type="button" class="secondary" id="cancelCard">취소</button>
          <button type="submit" id="saveCardBtn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="deleteCardModal">
    <div class="modal">
      <h3>카드 삭제</h3>
      <p style="color: var(--muted); font-size: 14px;">이 카드를 삭제할까요? 되돌릴 수 없습니다.</p>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelDeleteCard">취소</button>
        <button type="button" class="danger" id="confirmDeleteCard">삭제</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      auth, db, onAuthStateChanged, signOut,
      collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDoc,
    } from "./js/firebase.js";
    import { DEFAULT_INTERVAL_DAYS, nextIntervalDays, cardColor, formatExpiry, addDays, toDate } from "./js/utils.js";

    const params = new URLSearchParams(window.location.search);
    const vaultId = params.get("id");
    if (!vaultId) window.location.href = "vaults.html";

    const vaultNameEl = document.getElementById("vaultName");
    const cardGrid = document.getElementById("cardGrid");
    const emptyState = document.getElementById("emptyState");
    const addCardBtn = document.getElementById("addCardBtn");
    const cardModal = document.getElementById("cardModal");
    const cardModalTitle = document.getElementById("cardModalTitle");
    const cardForm = document.getElementById("cardForm");
    const cardFront = document.getElementById("cardFront");
    const cardBack = document.getElementById("cardBack");
    const cardError = document.getElementById("cardError");
    const cancelCard = document.getElementById("cancelCard");
    const deleteCardModal = document.getElementById("deleteCardModal");
    const cancelDeleteCard = document.getElementById("cancelDeleteCard");
    const confirmDeleteCard = document.getElementById("confirmDeleteCard");
    const logoutLink = document.getElementById("logoutLink");

    let currentUser = null;
    let unsubscribeCards = null;
    let editingCardId = null;
    let cardIdToDelete = null;
    const flippedCards = new Set();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      currentUser = user;
      await loadVaultInfo();
      subscribeCards();
    });

    logoutLink.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    async function loadVaultInfo() {
      const vaultRef = doc(db, "users", currentUser.uid, "vaults", vaultId);
      const snap = await getDoc(vaultRef);
      if (!snap.exists()) {
        window.location.href = "vaults.html";
        return;
      }
      vaultNameEl.textContent = snap.data().name;
    }

    addCardBtn.addEventListener("click", () => {
      editingCardId = null;
      cardModalTitle.textContent = "카드 추가";
      cardForm.reset();
      cardError.textContent = "";
      cardModal.classList.remove("hidden");
    });

    cancelCard.addEventListener("click", () => cardModal.classList.add("hidden"));

    cardForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const front = cardFront.value.trim();
      const back = cardBack.value.trim();
      if (!front || !back) return;
      const cardsCol = collection(db, "users", currentUser.uid, "vaults", vaultId, "cards");
      try {
        if (editingCardId) {
          await updateDoc(doc(cardsCol, editingCardId), { front, back, updatedAt: serverTimestamp() });
        } else {
          const now = new Date();
          await addDoc(cardsCol, {
            front,
            back,
            status: "graded",
            intervalDays: DEFAULT_INTERVAL_DAYS,
            expiresAt: addDays(now, DEFAULT_INTERVAL_DAYS),
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
          });
        }
        cardModal.classList.add("hidden");
      } catch (err) {
        cardError.textContent = "저장에 실패했습니다.";
      }
    });

    cancelDeleteCard.addEventListener("click", () => {
      cardIdToDelete = null;
      deleteCardModal.classList.add("hidden");
    });

    confirmDeleteCard.addEventListener("click", async () => {
      if (!cardIdToDelete) return;
      await deleteDoc(doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardIdToDelete));
      cardIdToDelete = null;
      deleteCardModal.classList.add("hidden");
    });

    let lastDocs = [];
    function subscribeCards() {
      const q = query(collection(db, "users", currentUser.uid, "vaults", vaultId, "cards"), orderBy("createdAt", "desc"));
      unsubscribeCards = onSnapshot(q, (snap) => {
        lastDocs = snap.docs;
        renderCardsNow();
      });
    }

    function renderCardsNow() {
      emptyState.classList.toggle("hidden", lastDocs.length !== 0);
      cardGrid.innerHTML = "";
      lastDocs.forEach((docSnap) => renderCard(docSnap));
    }

    function renderCard(docSnap) {
      const data = docSnap.data();
      const cardId = docSnap.id;
      const card = {
        status: data.status || "graded",
        intervalDays: data.intervalDays || DEFAULT_INTERVAL_DAYS,
        expiresAt: toDate(data.expiresAt),
      };
      const color = cardColor(card);
      const isFlipped = flippedCards.has(cardId);

      const el = document.createElement("div");
      el.className = `card color-${color}`;

      const faceLabel = document.createElement("div");
      faceLabel.className = "card-face-label";
      faceLabel.textContent = isFlipped ? "뒷면" : "앞면";

      const text = document.createElement("div");
      text.className = "card-text";
      text.textContent = isFlipped ? data.back : data.front;
      text.addEventListener("click", () => {
        if (isFlipped) flippedCards.delete(cardId);
        else flippedCards.add(cardId);
        renderCardsNow();
      });

      const footer = document.createElement("div");
      footer.className = "card-footer";
      const expiryText = document.createElement("span");
      expiryText.textContent = card.status === "held" ? "고정됨 (아이마이)" : formatExpiry(card.expiresAt);
      footer.appendChild(expiryText);

      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "icon-btn";
      editBtn.textContent = "수정";
      editBtn.addEventListener("click", () => openEdit(cardId, data));

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "icon-btn";
      delBtn.textContent = "삭제";
      delBtn.addEventListener("click", () => {
        cardIdToDelete = cardId;
        deleteCardModal.classList.remove("hidden");
      });

      const editRow = document.createElement("div");
      editRow.style.display = "flex";
      editRow.style.gap = "6px";
      editRow.appendChild(editBtn);
      editRow.appendChild(delBtn);

      el.appendChild(faceLabel);
      el.appendChild(text);

      if (isFlipped) {
        const actions = document.createElement("div");
        actions.className = "card-actions";

        const knowBtn = document.createElement("button");
        knowBtn.type = "button";
        knowBtn.className = "btn-know";
        knowBtn.textContent = "이이네";
        knowBtn.addEventListener("click", async (ev) => {
          ev.stopPropagation();
          const newInterval = nextIntervalDays(data.intervalDays);
          await updateDoc(doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardId), {
            status: "graded",
            intervalDays: newInterval,
            expiresAt: addDays(new Date(), newInterval),
            updatedAt: serverTimestamp(),
          });
          flippedCards.delete(cardId);
        });

        const unknownBtn = document.createElement("button");
        unknownBtn.type = "button";
        unknownBtn.className = "btn-unknown";
        unknownBtn.textContent = "아이마이";
        unknownBtn.addEventListener("click", async (ev) => {
          ev.stopPropagation();
          await updateDoc(doc(db, "users", currentUser.uid, "vaults", vaultId, "cards", cardId), {
            status: "held",
            updatedAt: serverTimestamp(),
          });
          flippedCards.delete(cardId);
        });

        actions.appendChild(knowBtn);
        actions.appendChild(unknownBtn);
        el.appendChild(actions);
      }

      el.appendChild(footer);
      el.appendChild(editRow);
      cardGrid.appendChild(el);
    }

    function openEdit(cardId, data) {
      editingCardId = cardId;
      cardModalTitle.textContent = "카드 수정";
      cardFront.value = data.front;
      cardBack.value = data.back;
      cardError.textContent = "";
      cardModal.classList.remove("hidden");
    }

  </script>
</body>
</html>
